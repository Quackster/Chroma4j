name: Nightly Release

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: false

jobs:
  build-nightly:
    name: Build nightly dist
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and verify
        run: bash ./gradlew clean build

      - name: Package web dist
        run: |
          mkdir -p build/nightly
          tar -czf build/nightly/chroma4j-nightly-web-dist.tar.gz -C web/dist .
          zip -r build/nightly/chroma4j-nightly-web-dist.zip web/dist

      - name: Upload nightly artifact
        uses: actions/upload-artifact@v4
        with:
          name: chroma4j-nightly-web-dist
          path: |
            build/nightly/chroma4j-nightly-web-dist.tar.gz
            build/nightly/chroma4j-nightly-web-dist.zip
          if-no-files-found: error

      - name: Refresh nightly GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          NIGHTLY_TAG: nightly
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          gh release delete "${NIGHTLY_TAG}" --yes --cleanup-tag || true
          git push origin ":refs/tags/${NIGHTLY_TAG}" || true

          if git rev-parse --verify "refs/tags/${NIGHTLY_TAG}" >/dev/null 2>&1; then
            git tag -d "${NIGHTLY_TAG}"
          fi

          git tag -f "${NIGHTLY_TAG}" "${GITHUB_SHA}"
          git push --force origin "refs/tags/${NIGHTLY_TAG}"

          gh release create "${NIGHTLY_TAG}" \
            build/nightly/chroma4j-nightly-web-dist.tar.gz \
            build/nightly/chroma4j-nightly-web-dist.zip \
            --title "Chroma4j Nightly" \
            --notes "Nightly web dist built from ${GITHUB_SHA} on $(date -u +'%Y-%m-%d %H:%M:%S UTC')." \
            --prerelease
